name: Daily FinOps Data Update

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: 

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install requests pyyaml pandas

      - name: Run ETL Script
        run: python data_pipeline.py 

      - name: Commit and Push Updated Data
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add data/ # Yahan apne yaml data wale folder ka path dalo
          git commit -m "Automated Data Update: Fresh FinOps Parameters" || echo "No changes to commit"
          git push
