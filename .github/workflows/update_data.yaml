name: Daily Cloud Pricing ETL

on:
  schedule:
    - cron: '0 0 * * *' # Roz raat 12 baje (UTC) apne aap chalega
  workflow_dispatch: # YEH HAI WO JAADUI CODE JISSE 'RUN WORKFLOW' KA BUTTON AAYEGA!

jobs:
  run-scraper:
    runs-on: ubuntu-latest # GitHub humein ek free Linux machine dega

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Requirements
        # Agar koi aur library use ki hai toh yahan add kar dena (jaise numpy, etc.)
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas pyyaml python-dotenv

      - name: Execute Scraper Engine
        # Yahan hum bot ko tumhari wo secret API key de rahe hain
        env:
          COMPUTE_PRICES_API_KEY: ${{ secrets.COMPUTE_PRICES_API_KEY }}
        run: |
          python src/scraper.py

      - name: Commit and Push New Data
        # Scraper jo naya YAML/JSON banayega, usko bot khud wapas repo mein daal dega
        run: |
          git config --local user.name "GitHub Action Bot"
          git config --local user.email "action@github.com"
          git add .
          git commit -m "Automated data sync: Cloud Prices Update" || echo "No new data to commit"
          git push